services:
  scraper:
    build: .
    container_name: hltb-scraper
    volumes:
      - ./data:/app/data
    command: python -m scraper.scraper

  notebook:
    build: .
    container_name: hltb-notebook
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888
      --no-browser --allow-root
      --NotebookApp.token=''
